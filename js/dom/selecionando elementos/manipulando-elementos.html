<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selecionando elementos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- <div id="conteudo">Conteudo</div> -->

    <ul id="itens">
        <li>Pedro</li>
        <li>Ana</li>
    </ul>

    <hr>

     <p id="item-clonar">Tamires</p>

    <button onclick="adicionar()">Adicionar</button>
    <button onclick="remover()">Remover</button>

    <script type="text/javascript">

        // const obj = document.getElementById('conteudo');
        // obj.textContent = "Jamilton"
        //obj.innerHTML = "<p style='color: red'>Jamilton</p>"

        const ul = document.getElementById('itens');
        const li = document.createElement('li');

        const ulFilha = document.createElement('ul');
        const liFilha = document.createElement('li');
        liFilha.textContent = "li criada";
        ulFilha.appendChild(liFilha);


        function adicionar() {
            // li.appendChild(ulFilha);
            // ul.appendChild(li);

            li.appendChild(ulFilha);
            ul.insertBefore(li, ul.children[1]);

            const itemClonar = document.getElementById('item-clonar');
            const item = itemClonar.cloneNode(true);
            ul.appendChild(item);
        }

        function remover() {
            ul.removeChild(li);
        }

    </script>
</body>
</html>
