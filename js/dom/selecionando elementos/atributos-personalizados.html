<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selecionando elementos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <span id="itens" quantidade="2" data-status="pendente">
        2 itens no carrinho
    </span>

    <ul id="lista">
        <li codigo="001">Jamilton</li>
        <li codigo="002">Ana</li>
    </ul>

    <label id="labelNome" for="nome">Nome</label>
    <input type="text" name="nome" id="nome">

    <script type="text/javascript">

        const obj = document.getElementById('itens');
        //obj.setAttribute('quantidade', '10');
        //console.log(obj.getAttribute('quantidade')); // Usar getAttribute para acessar atributos personalizados

        //obj.dataset.status = 'finalizado'
        //console.log(obj.dataset.status);
        console.log(obj.removeAttribute('data-status')) // Removendo atributo
        console.log(obj.hasAttribute('data-status')) // Elemento existe?
        console.log(obj.getAttribute('data-status')) // Imprimindo no console

        console.log(obj.attributes[0]) // Selecionando atributos pela posição
        console.log(obj.attributes.quantidade) // Acessando quantidade

    </script>
</body>
</html>
