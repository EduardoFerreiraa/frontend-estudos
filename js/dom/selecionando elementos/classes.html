<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selecionando elementos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <span>Jamilton Damasceno</span>

    <button onclick="executar()">Clique aqui</button>

    <script type="text/javascript">

        function executar() {
            const obj = document.querySelector('span');
            const classes = obj.classList;

            // console.log(classes);
            // console.log(classes.length);
            console.log(classes.contains('vermelho'));
            classes.add('vermelho')
        }


    </script>
</body>
</html>
